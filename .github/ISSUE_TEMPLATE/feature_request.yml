name: Feature request
description: Propose a change or enhancement to the open-source Free edition
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Please confirm the proposal fits the Free edition's scope before
        submitting. New skills for commercial-edition domains (UniProt,
        AlphaFold, ChEMBL, PubChem, OpenAlex, EuropePMC, ClinVar, dbSNP,
        Ensembl, ClinicalTrials, etc.) are out of scope — see CONTRIBUTING.md.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: How would you like the project to address this?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope confirmation
      options:
        - label: This proposal does not duplicate Pro / Enterprise edition features.
          required: true
        - label: This proposal does not bypass third-party database rate limits or licensing.
          required: true
